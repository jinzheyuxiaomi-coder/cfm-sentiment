document.getElementById("conclusionBox").innerHTML=`<div class="label">📋 ${d.date} 核心结论</div>${d.conclusion||""}<br><span class="trend-badge ${tc}">${tt}</span>`;
const sp=d.sentiment_pct;
function delta(k){if(!prev)return"";const diff=sp[k]-prev.sentiment_pct[k];if(Math.abs(diff)<.5)return'<div class="card-delta flat">→ 持平</div>';const cls=diff>0?(k==="negative"?"down":"up"):(k==="negative"?"up":"down");return`<div class="card-delta ${cls}">${diff>0?"+":""}${diff.toFixed(1)}% vs昨日</div>`}
document.getElementById("statsGrid").innerHTML=`<div class="card"><div class="card-title">采集量</div><div class="card-value total">${d.total_texts}</div><div class="card-sub">条文本</div></div><div class="card"><div class="card-title">正面</div><div class="card-value positive">${sp.positive}%</div>${delta("positive")}</div><div class="card"><div class="card-title">负面</div><div class="card-value negative">${sp.negative}%</div>${delta("negative")}</div><div class="card"><div class="card-title">中性</div><div class="card-value neutral">${sp.neutral}%</div>${delta("neutral")}</div>`;
document.getElementById("kwCloud").innerHTML=Object.entries(d.keywords||{}).slice(0,15).map(([k,v])=>`<div class="keyword">${k}<span class="count">${v}</span></div>`).join("");
function cmtHtml(samples,cls){if(!samples||!samples.length)return`<li class="comment-item ${cls}" style="color:#667799">暂无数据</li>`;return samples.map(c=>{const sc=srcColors[c.source]||"#667799";const lb=c.url?`<a class="link-btn" href="${c.url}" target="_blank">查看原帖→</a>`:"";return`<li class="comment-item ${cls}"><div class="comment-meta"><span class="src-tag" style="background:${sc}">${c.source||"未知"}</span>${lb}</div><div>${c.text}</div></li>`}).join("")}
document.getElementById("posComments").innerHTML=cmtHtml(d.positive_samples,"pos");document.getElementById("negComments").innerHTML=cmtHtml(d.negative_samples,"neg");
const strats=d.strategies||[];document.getElementById("strategiesBox").innerHTML=strats.length?strats.map(s=>{const pc=priColors[s.priority]||"#667799",tc2=typeColors[s.type]||"#8899bb";return`<div class="strategy-card"><div class="strategy-head"><div><span class="type-tag" style="background:${tc2}">${s.type||"策略"}</span><span class="strategy-topic">${s.topic}</span></div><span class="priority-tag" style="color:${pc};border-color:${pc}">${s.priority}优先</span></div><div class="strategy-insight">💡 ${s.insight||""}</div><div class="strategy-action">📋 ${s.action}</div></div>`}).join(""):'<div style="color:#667799;font-size:13px">暂无</div>';
const resps=d.responses||[];document.getElementById("responsesBox").innerHTML=resps.length?resps.map(r=>`<div class="response-card"><div class="response-head"><span class="response-severity">${r.severity}</span><span class="response-issue">${r.issue}</span></div><div class="response-body">${r.response}</div><div class="response-tone">🎯 ${r.tone}</div></div>`).join(""):'<div style="color:#667799;font-size:13px">暂无预警</div>';
}
function renderCharts(){
const dates=history.map(h=>h.date.slice(5));
trendChart=new Chart(document.getElementById("trendChart"),{type:"line",data:{labels:dates,datasets:[{label:"正面%",data:history.map(h=>h.sentiment_pct.positive),borderColor:"#4ade80",backgroundColor:"rgba(74,222,128,.1)",fill:true,tension:.3},{label:"负面%",data:history.map(h=>h.sentiment_pct.negative),borderColor:"#f87171",backgroundColor:"rgba(248,113,113,.1)",fill:true,tension:.3},{label:"中性%",data:history.map(h=>h.sentiment_pct.neutral),borderColor:"#fbbf24",backgroundColor:"rgba(251,191,36,.05)",fill:true,tension:.3,borderDash:[4,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8899bb",font:{size:11}}}},scales:{x:{ticks:{color:"#667799"},grid:{color:"rgba(255,255,255,.04)"}},y:{min:0,max:100,ticks:{color:"#667799",callback:v=>v+"%"},grid:{color:"rgba(255,255,255,.04)"}}}}});
volumeChart=new Chart(document.getElementById("volumeChart"),{type:"bar",data:{labels:dates,datasets:[{label:"采集量",data:history.map(h=>h.total_texts),backgroundColor:"rgba(96,165,250,.6)",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#667799"},grid:{display:false}},y:{ticks:{color:"#667799"},grid:{color:"rgba(255,255,255,.04)"}}}}})}
init();
</script>
</body>
</html>
