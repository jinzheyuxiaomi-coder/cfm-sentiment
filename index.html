const history=ALL.history||[];let curIdx=history.length-1;
const srcColors={"百度贴吧":"#4e7dd9","B站·评论":"#fb7299","B站·弹幕":"#ff6699","B站":"#fb7299","TapTap":"#15c47a","抖音/短视频":"#333","游戏媒体":"#e6a817","综合搜索":"#8899bb","综合":"#8899bb","知乎":"#0066ff","抖音评论":"#333"};
const priColors={"高":"#f87171","中":"#fbbf24","低":"#4ade80"};const typeColors={"正面洞察":"#4ade80","热度窗口":"#60a5fa"};
let trendChart,volumeChart;
let stratFilter="all",respFilter="all";

// localStorage持久化状态
function loadState(){try{return JSON.parse(localStorage.getItem("cfm_sentiment_state")||"{}")}catch(e){return{}}}
function saveState(state){localStorage.setItem("cfm_sentiment_state",JSON.stringify(state))}
let itemState=loadState();

function init(){renderDateBtns();renderCharts();renderDay(curIdx);renderStrategies();renderResponses();renderFilters()}

function renderDateBtns(){document.getElementById("dateButtons").innerHTML=history.map((h,i)=>`<button class="date-btn ${i===curIdx?"active":""}" onclick="switchDay(${i})">${h.date.slice(5)}</button>`).join("")}
function switchDay(i){curIdx=i;document.querySelectorAll(".date-btn").forEach((b,j)=>b.classList.toggle("active",j===i));renderDay(i)}

function renderDay(i){
const d=history[i],prev=i>0?history[i-1]:null;
document.getElementById("metaInfo").innerHTML=`查看: ${d.date}<br>更新: ${(ALL.last_updated||"").slice(0,16).replace("T"," ")}<br>每日10:00自动采集`;
let tt="数据积累中...",tc="flat";
if(prev&&prev.sentiment_pct.positive){const pd=d.sentiment_pct.positive-prev.sentiment_pct.positive,nd=d.sentiment_pct.negative-prev.sentiment_pct.negative;if(pd>3){tt=`📈 正面+${pd.toFixed(1)}%`;tc="up"}else if(nd>3){tt=`📉 负面+${nd.toFixed(1)}%`;tc="down"}else{tt="➡️ 走势平稳"}}
const rawInfo=d.total_raw?` (原始${d.total_raw}条，去重后新增${d.total_texts}条)`:"";
// 亮点区块
const hl=d.highlights||[];
document.getElementById("highlightBox").innerHTML=hl.length?`<div class="label">🟢 今日亮点</div><ul>${hl.map(h=>`<li>• ${h}</li>`).join("")}</ul>`:'<div class="label">🟢 今日亮点</div>暂无新增亮点';
// 预警区块
const al=d.alerts||[];
document.getElementById("alertBox").innerHTML=al.length?`<div class="label">🔴 今日预警</div><ul>${al.map(a=>`<li>${a.level||"⚠️"} ${a.text}</li>`).join("")}</ul>`:'<div class="label">🔴 今日预警</div><span style="color:#4ade80">✅ 无预警，舆论平稳</span>';
// 数据概览
document.getElementById("conclusionBox").innerHTML=`<div class="label">📊 数据概览</div>${d.conclusion||""}${rawInfo?`<span style="font-size:11px;color:#667799">${rawInfo}</span>`:""} <span class="trend-badge ${tc}">${tt}</span>`;
const sp=d.sentiment_pct||{positive:0,negative:0,neutral:0};
function delta(k){if(!prev||!prev.sentiment_pct.positive)return"";const diff=sp[k]-prev.sentiment_pct[k];if(Math.abs(diff)<.5)return'<div class="card-delta flat">→ 持平</div>';const cls=diff>0?(k==="negative"?"down":"up"):(k==="negative"?"up":"down");return`<div class="card-delta ${cls}">${diff>0?"+":""}${diff.toFixed(1)}% vs昨日</div>`}
document.getElementById("statsGrid").innerHTML=`<div class="card"><div class="card-title">新增</div><div class="card-value total">${d.total_texts}</div><div class="card-sub">条新评论</div></div><div class="card"><div class="card-title">正面</div><div class="card-value positive">${sp.positive}%</div>${delta("positive")}</div><div class="card"><div class="card-title">负面</div><div class="card-value negative">${sp.negative}%</div>${delta("negative")}</div><div class="card"><div class="card-title">中性</div><div class="card-value neutral">${sp.neutral}%</div>${delta("neutral")}</div>`;
document.getElementById("kwCloud").innerHTML=Object.entries(d.keywords||{}).slice(0,15).map(([k,v])=>`<div class="keyword">${k}<span class="count">${v}</span></div>`).join("");
function cmtHtml(samples,cls){if(!samples||!samples.length)return`<li class="comment-item ${cls}" style="color:#667799">今日无新增${cls==="weapon"?"武器相关":""}评论 ✅</li>`;return samples.map(c=>{const sc=srcColors[c.source]||"#667799";const lb=c.url?`<a class="link-btn" href="${c.url}" target="_blank">查看原帖→</a>`:"";const st=cls==="weapon"?`<span class="sent-tag ${c.sentiment==="positive"?"pos":c.sentiment==="negative"?"neg":""}">${c.sentiment==="positive"?"好评":c.sentiment==="negative"?"差评":"中性"}</span>`:"";return`<li class="comment-item ${cls}"><div class="comment-meta"><span class="src-tag" style="background:${sc}">${c.source||"未知"}</span>${st}${lb}</div><div>${c.text}</div></li>`}).join("")}
document.getElementById("posComments").innerHTML=cmtHtml(d.positive_samples,"pos");
document.getElementById("negComments").innerHTML=cmtHtml(d.negative_samples,"neg");
document.getElementById("sugComments").innerHTML=cmtHtml(d.suggestion_samples||[],"sug");
document.getElementById("weaponComments").innerHTML=cmtHtml(d.weapon_comments||[],"weapon");
}

function renderFilters(){
["stratFilter","respFilter"].forEach(id=>{
document.getElementById(id).innerHTML=["all","pending","done","dismissed"].map(f=>`<button class="filter-btn ${(id==="stratFilter"?stratFilter:respFilter)===f?"active":""}" onclick="${id==='stratFilter'?'setStratFilter':'setRespFilter'}('${f}')">${{all:"全部",pending:"待处理",done:"已完成",dismissed:"已忽略"}[f]}</button>`).join("")})
}
function setStratFilter(f){stratFilter=f;renderFilters();renderStrategies()}
function setRespFilter(f){respFilter=f;renderFilters();renderResponses()}

function renderStrategies(){
let items=ALL_STRATS;
if(stratFilter!=="all")items=items.filter(s=>(itemState[s.id]?.status||s.status)===stratFilter);
if(!items.length){document.getElementById("strategiesBox").innerHTML='<div style="color:#667799;font-size:13px">无匹配项</div>';return}
document.getElementById("strategiesBox").innerHTML=items.map(s=>{
const st=itemState[s.id]?.status||s.status;const note=itemState[s.id]?.note||s.note||"";
const pc=priColors[s.priority]||"#667799";const tc=typeColors[s.type]||"#8899bb";
return`<div class="strategy-card ${st}"><div class="strategy-head"><div><span class="type-tag" style="background:${tc}">${s.type||"策略"}</span><span class="strategy-topic">${s.topic}</span><span class="date-tag">${s.created||""}</span></div><span class="priority-tag" style="color:${pc};border-color:${pc}">${s.priority}优先</span></div><div class="strategy-insight">💡 ${s.insight||""}</div><div class="strategy-action">📋 ${s.action}</div>${note?`<div class="note-display">📝 ${note}</div>`:""}<div class="action-bar"><button class="action-btn done-btn ${st==="done"?"active":""}" onclick="setItemStatus('${s.id}','done')">✅ 已完成</button><button class="action-btn dismiss-btn ${st==="dismissed"?"active":""}" onclick="setItemStatus('${s.id}','dismissed')">⊘ 忽略</button><input class="note-input" placeholder="添加批注..." value="${note.replace(/"/g,'&quot;')}" onchange="setItemNote('${s.id}',this.value)"></div></div>`}).join("")}

function renderResponses(){
let items=ALL_RESPS;
if(respFilter!=="all")items=items.filter(r=>(itemState[r.id]?.status||r.status)===respFilter);
if(!items.length){document.getElementById("responsesBox").innerHTML='<div style="color:#667799;font-size:13px">无匹配项</div>';return}
document.getElementById("responsesBox").innerHTML=items.map(r=>{
const st=itemState[r.id]?.status||r.status;const note=itemState[r.id]?.note||r.note||"";
return`<div class="response-card ${st}"><div class="response-head"><span class="response-severity">${r.severity}</span><span class="response-issue">${r.issue}</span><span class="date-tag">${r.created||""}</span></div><div class="response-body">${r.response}</div><div class="response-tone">🎯 ${r.tone}</div>${note?`<div class="note-display">📝 ${note}</div>`:""}<div class="action-bar"><button class="action-btn done-btn ${st==="done"?"active":""}" onclick="setRespStatus('${r.id}','done')">✅ 已回应</button><button class="action-btn dismiss-btn ${st==="dismissed"?"active":""}" onclick="setRespStatus('${r.id}','dismissed')">⊘ 忽略</button><input class="note-input" placeholder="添加批注..." value="${note.replace(/"/g,'&quot;')}" onchange="setRespNote('${r.id}',this.value)"></div></div>`}).join("")}

function setItemStatus(id,status){if(!itemState[id])itemState[id]={};itemState[id].status=itemState[id].status===status?"pending":status;saveState(itemState);renderStrategies()}
function setItemNote(id,note){if(!itemState[id])itemState[id]={};itemState[id].note=note;saveState(itemState);renderStrategies()}
function setRespStatus(id,status){if(!itemState[id])itemState[id]={};itemState[id].status=itemState[id].status===status?"pending":status;saveState(itemState);renderResponses()}
function setRespNote(id,note){if(!itemState[id])itemState[id]={};itemState[id].note=note;saveState(itemState);renderResponses()}

function renderCharts(){
const dates=history.map(h=>h.date.slice(5));
trendChart=new Chart(document.getElementById("trendChart"),{type:"line",data:{labels:dates,datasets:[{label:"正面%",data:history.map(h=>h.sentiment_pct?.positive||0),borderColor:"#4ade80",backgroundColor:"rgba(74,222,128,.1)",fill:true,tension:.3},{label:"负面%",data:history.map(h=>h.sentiment_pct?.negative||0),borderColor:"#f87171",backgroundColor:"rgba(248,113,113,.1)",fill:true,tension:.3},{label:"中性%",data:history.map(h=>h.sentiment_pct?.neutral||0),borderColor:"#fbbf24",backgroundColor:"rgba(251,191,36,.05)",fill:true,tension:.3,borderDash:[4,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8899bb",font:{size:11}}}},scales:{x:{ticks:{color:"#667799"},grid:{color:"rgba(255,255,255,.04)"}},y:{min:0,max:100,ticks:{color:"#667799",callback:v=>v+"%"},grid:{color:"rgba(255,255,255,.04)"}}}}});
volumeChart=new Chart(document.getElementById("volumeChart"),{type:"bar",data:{labels:dates,datasets:[{label:"新增",data:history.map(h=>h.total_texts),backgroundColor:"rgba(96,165,250,.6)",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#667799"},grid:{display:false}},y:{ticks:{color:"#667799"},grid:{color:"rgba(255,255,255,.04)"}}}}})}
init();
</script>
</body>
</html>
